name: Build patched dolphin_libretro (Win64)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone dolphin-libretro
        run: |
          git clone --depth=1 https://github.com/libretro/dolphin.git dolphin-src
          cd dolphin-src
          git submodule update --init --recursive

      - name: Patch Main.cpp - add glFinish after frame
        shell: pwsh
        run: |
          $file = "dolphin-src/Source/Core/DolphinLibretro/Main.cpp"
          $lines = [System.IO.File]::ReadAllLines($file)
          $out = [System.Collections.Generic.List[string]]::new()
          $patched = $false
          for ($i = 0; $i -lt $lines.Count; $i++) {
            $out.Add($lines[$i])
            if ($lines[$i].Trim() -eq "system.GetCPU().RunSingleFrame();" -and -not $patched) {
              while ($i + 1 -lt $lines.Count) {
                $i++
                $out.Add($lines[$i])
                if ($lines[$i].Trim() -eq "}") { break }
              }
              $out.Add("")
              $out.Add("  // [Rec0m88] Flush GL so XFB blit completes before retro_run returns")
              $out.Add("  if (g_gfx && Config::Get(Config::MAIN_GFX_BACKEND) == `"OGL`")")
              $out.Add("  {")
              $out.Add("    glFinish();")
              $out.Add("  }")
              $patched = $true
            }
          }
          if ($patched) {
            [System.IO.File]::WriteAllLines($file, $out.ToArray())
            Write-Host "Patch applied successfully"
          } else {
            Write-Error "Could not find RunSingleFrame in Main.cpp"
            exit 1
          }

      - name: Verify patch
        shell: pwsh
        run: |
          $content = Get-Content "dolphin-src/Source/Core/DolphinLibretro/Main.cpp" -Raw
          if ($content.Contains("glFinish()")) {
            Write-Host "glFinish() found in patched file - OK"
          } else {
            Write-Error "glFinish() NOT found - patch failed"
            exit 1
          }

      - name: Configure CMake
        run: |
          cd dolphin-src
          mkdir build
          cd build
          cmake.exe -DLIBRETRO=ON -DENABLE_QT=0 -DCMAKE_POLICY_VERSION_MINIMUM="3.5" -DCMAKE_BUILD_TYPE=Release -DCMAKE_VERBOSE_MAKEFILE=ON -DCMAKE_CXX_FLAGS="/WX-" -DCMAKE_C_FLAGS="/WX-" ..

      - name: Build
        run: |
          cd dolphin-src/build
          cmake.exe --build . --target dolphin_libretro --config Release

      - name: List all build outputs
        shell: pwsh
        run: |
          Write-Host "=== All DLLs in build tree ==="
          Get-ChildItem -Path dolphin-src/build -Recurse -Filter "*.dll" | ForEach-Object { Write-Host $_.FullName }
          Write-Host ""
          Write-Host "=== All files matching dolphin* ==="
          Get-ChildItem -Path dolphin-src/build -Recurse -Filter "dolphin*" | ForEach-Object { Write-Host "$($_.FullName)  ($($_.Length) bytes)" }
          Write-Host ""
          Write-Host "=== Binaries folder (if exists) ==="
          if (Test-Path "dolphin-src/build/Binaries") {
            Get-ChildItem -Path dolphin-src/build/Binaries -Recurse | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "No Binaries folder found"
          }
          Write-Host ""
          Write-Host "=== Top-level build folder ==="
          Get-ChildItem -Path dolphin-src/build -Depth 1 | ForEach-Object { Write-Host $_.FullName }

      - name: Find and stage DLL
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path dolphin-src -Recurse -Filter "dolphin_libretro.dll" | Select-Object -First 1
          if (-not $dll) {
            $dll = Get-ChildItem -Path dolphin-src -Recurse -Filter "dolphin*.dll" | Select-Object -First 1
          }
          if ($dll) {
            Write-Host "Found DLL at: $($dll.FullName)"
            Copy-Item $dll.FullName -Destination ./dolphin_libretro.dll
          } else {
            Write-Error "No dolphin DLL found anywhere in build tree"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dolphin_libretro-win64-patched
          path: dolphin_libretro.dll
